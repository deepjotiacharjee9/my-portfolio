<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Deepjoti Acharjee</title>
    <!-- GitHub Pages SPA redirect hack -->
    <script>
      var seg = window.location.pathname.slice(1).split('/').slice(1).join('/');
      window.location.replace(
        window.location.origin + '/my-portfolio/' + (seg ? '?' + seg : '')
      );
    </script>
  </head>
  <body></body>
</html>
